<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Тест ипотечного сервиса</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 20px auto; padding: 0 20px; }
        textarea { width: 100%; font-family: monospace; }
        button { padding: 8px 20px; margin: 5px 0; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 5px; overflow-x: auto; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Тест API ипотечного сервиса</h1>

    <div class="section">
        <h3>1. Загрузить модель</h3>
        <input type="file" id="modelFile" accept=".pkl">
        <button onclick="uploadModel()">Загрузить</button>
        <pre id="uploadResult"></pre>
    </div>

    <div class="section">
        <h3>2. Предсказание (ручной ввод)</h3>
        <textarea id="inputData" rows="12">{
  "records": [
    {
      "person_age": 25,
      "person_income": 50000,
      "person_emp_exp": 5,
      "loan_amnt": 150000,
      "loan_int_rate": 6.5,
      "loan_percent_income": 0.3,
      "cb_person_cred_hist_length": 5,
      "credit_score": 720
    }
  ]
}</textarea>
        <br>
        <button onclick="predict()">Предсказать</button>
        <pre id="predictResult"></pre>
    </div>

    <div class="section">
        <h3>3. Загрузить CSV</h3>
        <input type="file" id="csvFile" accept=".csv">
        <button onclick="predictCsv()">Обработать</button>
        <pre id="csvResult"></pre>
    </div>

    <script>
        const API = 'http://localhost:8000';

        async function uploadModel() {
            const file = document.getElementById('modelFile').files[0];
            if (!file) return alert('Выбери файл');
            const formData = new FormData();
            formData.append('file', file);
            
            const res = await fetch(`${API}/model/upload-model`, { method: 'POST', body: formData });
            const data = await res.json();
            document.getElementById('uploadResult').textContent = JSON.stringify(data, null, 2);
        }

        async function predict() {
            const input = document.getElementById('inputData').value;
            
            const res = await fetch(`${API}/model/predict`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: input
            });
            const data = await res.json();
            document.getElementById('predictResult').textContent = JSON.stringify(data, null, 2);
        }

        async function predictCsv() {
            const file = document.getElementById('csvFile').files[0];
            if (!file) return alert('Выбери CSV');
            const formData = new FormData();
            formData.append('file', file);
            
            const res = await fetch(`${API}/model/predict-from-csv`, { method: 'POST', body: formData });
            const data = await res.json();
            // csv_data может быть огромным — показываем только первые 500 символов
            const display = { ...data };
            if (display.csv_data) {
                display.csv_preview = display.csv_data.substring(0, 500) + '...';
                delete display.csv_data;
            }
            document.getElementById('csvResult').textContent = JSON.stringify(display, null, 2);
        }
    </script>
</body>
</html>
